<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCS, Tanggal, Nama Penyuluh</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
    /* 1. CSS DASAR (BERLAKU DI SEMUA TAMPILAN) */
    * { box-sizing: border-box; }
    body { font-family: 'Times New Roman', serif; margin: 0; padding: 20px; background: #000000; }
    .container { width: 95%; max-width: 1000px; margin: auto; background: white; padding: 40px; border-radius: 8px; }
    .header { text-align: center; margin-bottom: 25px; }
    .header h2, .header h3 { margin: 2px 0; text-transform: uppercase; font-size: 1.1rem; font-weight: bold; }
    
    .info-section { display: grid; grid-template-columns: 180px 20px 1fr; gap: 2px 0; margin-bottom: 25px; }
    input[type="text"], input[type="date"], select, textarea { 
        padding: 6px 10px; border: 1px solid #000; border-radius: 4px; width: 100%; font-size: 14px; 
    }

    /* 2. TAMPILAN TABEL STANDAR (DESKTOP) */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; counter-reset: nomorKonten; }
    tr { counter-increment: nomorKonten; }
    th, td { border: 1px solid #000; padding: 8px; text-align: center; vertical-align: middle; }
    th { background: #f2f2f2; font-size: 12px; }
    .col-no { width: 40px; }
    .col-date { width: 18%; }
    .col-konten { width: 30%; }
    .preview-box { width: 100%; height: 110px; border: 1px dashed #bbb; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; display: none; }

    /* 3. TAMPILAN KHUSUS LAYAR HP (MEDIA SCREEN) - AGAR TIDAK RUSAK */
    @media screen and (max-width: 768px) {
        /* Kembalikan font size ke 16px agar iPhone tidak zoom otomatis saat klik input */
        input, select, textarea { font-size: 16px !important; }
        .container { padding: 15px; width: 98%; }
        .info-section { grid-template-columns: 1fr; }
        .info-section span { display: none; }
        
        /* Ubah tabel jadi kartu vertikal agar enak di HP */
        table, thead, tbody, th, td, tr { display: block; }
        thead { display: none; }
        tr { margin-bottom: 25px; border: 2px solid #ddd; border-radius: 12px; padding: 15px; background: #fff; }
        tr::before { content: "Konten #" counter(nomorKonten, decimal-leading-zero); display: block; font-weight: bold; margin-bottom: 10px; }
        
        td { border: none !important; width: 100% !important; padding: 0 !important; margin-bottom: 10px; display: block; text-align: left !important; }
        td[data-label="No."] { display: none; }
        
        /* Layout Like, Comment, Share sejajar di layar HP */
        td[data-label="Like"], td[data-label="Comment"], td[data-label="Share"] { 
            display: inline-grid !important; width: 31% !important; margin-right: 1%; text-align: center !important;
        }
        td[data-label="Like"]::before, td[data-label="Comment"]::before, td[data-label="Share"]::before { 
            content: attr(data-label); font-size: 11px; font-weight: bold; margin-bottom: 4px; 
        }
    }

    /* 4. TAMPILAN KHUSUS PDF (HANYA AKTIF SAAT DOWNLOAD) */
    /* Kita gunakan selektor .pdf-mode secara spesifik */
    .pdf-mode { width: 210mm !important; max-width: 210mm !important; padding: 10mm !important; }
    
    .pdf-mode table { display: table !important; width: 100% !important; table-layout: fixed !important; }
    .pdf-mode thead { display: table-header-group !important; }
    .pdf-mode tbody { display: table-row-group !important; }
    .pdf-mode tr { display: table-row !important; border: none !important; padding: 0 !important; }
    
    .pdf-mode td, .pdf-mode th { 
        display: table-cell !important; 
        border: 1px solid #000 !important; 
        font-size: 10px !important; 
        padding: 5px !important;
    }

    /* Matikan gaya kartu HP saat di PDF */
    .pdf-mode tr::before, .pdf-mode td::before { content: none !important; display: none !important; }
    .pdf-mode .temp-text { display: block !important; }
    .pdf-mode .preview-box { width: 85px !important; height: 110px !important; border: 1px solid #000 !important; }

    /* Utilitas */
    .no-print { display: block; }
    .temp-text { display: none; white-space: pre-wrap; text-align: left; }
    .controls, .action-area { margin-top: 20px; }
    .btn-print { background: #2c3e50; color: white; width: 100%; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; }
    .footer { text-align: center; margin-top: 20px; color: white; }
</style>
</head>

<body>

<div class="container" id="contentToExport">
    <div class="header">
        <h2>LAPORAN PENDERASAN INFORMASI DAN PEMBANGUNAN PERTANIAN</h2>
        <h3>PENYULUH PERTANIAN</h3>
        <h3>TAHUN 2026</h3>
    </div>

    <div class="info-section">
        <label>PERIODE</label>
        <span>:</span>
        <select id="id_periode">
            <option>BULAN JANUARI</option><option>BULAN FEBRUARI</option><option>BULAN MARET</option>
            <option>BULAN APRIL</option><option>BULAN MEI</option><option>BULAN JUNI</option>
            <option>BULAN JULI</option><option>BULAN AGUSTUS</option><option>BULAN SEPTEMBER</option>
            <option>BULAN OKTOBER</option><option>BULAN NOVEMBER</option><option>BULAN DESEMBER</option>
        </select>

        <label>NAMA PENYULUH</label>
        <span>:</span>
        <input type="text" id="id_nama" placeholder="Cth: ABDUL RAHMAN, SP">

        <label>NIP.</label>
        <span>:</span>
        <input type="text" id="id_nip" placeholder="Cth: 199009202020121001">

        <label>WILBIN/WKPP</label>
        <span>:</span>
        <input type="text" id="id_wilayah" placeholder="Cth: DESA MANURUNG">
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2" class="col-no">No.</th>
                <th rowspan="2" class="col-date">TANGGAL</th>
                <th rowspan="2" class="col-konten">JUDUL KONTEN</th>
                <th colspan="3">EVIDEN</th>
            </tr>
            <tr>
                <th class="col-eviden">LIKE</th>
                <th class="col-eviden">COMMENT</th>
                <th class="col-eviden">SHARE</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="controls no-print">
        <button class="btn btn-remove" type="button" onclick="removeRow()">- Hapus Baris</button>
        <button class="btn btn-add" type="button" onclick="addRow(true)">+ Tambah Baris</button>
    </div>

    <div class="action-area no-print">
        <button class="btn-print" type="button" onclick="cetakLaporan()">SIMPAN/DOWNLOAD PDF</button>
    </div>
</div>

<footer class="footer no-print">
    copyright: King Mamank 2026
</footer>

<script>
let daftarJudulGlobal = [];
async function sinkronisasiJudul() {
    const url = "https://script.google.com/macros/s/AKfycbzBRXwcAkJBPLvnvOdFuWKqag-XBq2U81kYBx3LyOKGCM0Sqx8WileVfvMa1T6BkEQH6A/exec";
    try {
        const response = await fetch(url + "?t=" + new Date().getTime());
        daftarJudulGlobal = await response.json();
        document.querySelectorAll('.judul-select').forEach(select => isiOpsiSelect(select));
    } catch (e) { console.error("Gagal sinkronisasi:", e); }
}

function isiOpsiSelect(selectElement) {
    const currentVal = selectElement.value;
    selectElement.innerHTML = '<option value="">List Judul Konten</option>';
    daftarJudulGlobal.forEach(judul => {
        const opt = document.createElement('option');
        opt.value = judul; opt.textContent = judul;
        selectElement.appendChild(opt);
    });
    selectElement.value = currentVal;
}

let count = 0;
const tableBody = document.getElementById('tableBody');

function addRow(showAlert = false) {
    count++;
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td data-label="No.">${count}.</td>
        <td data-label="Tanggal" class="col-date">
            <input type="date" class="inp-tgl" value="${new Date().toISOString().split('T')[0]}">
            <div class="temp-text temp-tgl-display"></div>
        </td>
        <td data-label="Judul Konten" class="col-konten">
            <div class="textarea-container">
                <select class="no-print judul-select" onchange="const ta=this.nextElementSibling; ta.value=this.value; ta.dispatchEvent(new Event('input'));">
                    <option value="">List Judul Konten</option>
                </select>
                <textarea class="inp-judul" placeholder="Pilih atau ketik manual"></textarea>
                <div class="temp-text temp-judul-display"></div>
                <div class="textarea-actions no-print">
                    <button type="button" class="btn-action btn-clear" onclick="clearText(this)">🗑️</button>
                    <button type="button" class="btn-action btn-paste" onclick="pasteText(this)">📋</button>
                </div>
            </div>
        </td>
        <td data-label="Like">
            <input type="file" accept="image/*" onchange="pv(this,'l${count}')" class="no-print">
            <div class="preview-box"><img id="l${count}"></div>
        </td>
        <td data-label="Comment">
            <input type="file" accept="image/*" onchange="pv(this,'c${count}')" class="no-print">
            <div class="preview-box"><img id="c${count}"></div>
        </td>
        <td data-label="Share">
            <input type="file" accept="image/*" onchange="pv(this,'s${count}')" class="no-print">
            <div class="preview-box"><img id="s${count}"></div>
        </td>
    `;
    tableBody.appendChild(tr);
    isiOpsiSelect(tr.querySelector('.judul-select'));
    if (showAlert) alert("Baris ditambahkan.");
}

function removeRow() {
    if (count > 2) {
        if (confirm("Hapus baris terakhir?")) { tableBody.removeChild(tableBody.lastChild); count--; }
    } else { alert("Minimal 2 baris."); }
}

function pv(input, id) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById(id);
            img.src = e.target.result; img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

function clearText(btn) { btn.closest('.textarea-container').querySelector('textarea').value = ""; }
async function pasteText(btn) {
    try {
        const text = await navigator.clipboard.readText();
        btn.closest('.textarea-container').querySelector('textarea').value = text;
    } catch (err) { alert('Gagal paste.'); }
}

async function cetakLaporan() {
    const element = document.getElementById('contentToExport');
    const namaPenyuluh = document.getElementById('id_nama').value || "Penyuluh";
    
    // Simpan posisi scroll agar tidak terpotong di HP
    const scrollY = window.scrollY;
    window.scrollTo(0, 0);

    // 1. Konversi Input ke Teks agar tidak muncul kotak input di PDF
    document.querySelectorAll('#tableBody tr').forEach(row => {
        const tglInp = row.querySelector('.inp-tgl');
        const tglDisp = row.querySelector('.temp-tgl-display');
        const jdlInp = row.querySelector('.inp-judul');
        const jdlDisp = row.querySelector('.temp-judul-display');

        if(tglInp && tglDisp) {
            const d = new Date(tglInp.value);
            tglDisp.innerText = tglInp.value ? `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}` : "";
            tglDisp.style.display = 'block';
            tglInp.style.display = 'none';
        }
        if(jdlInp && jdlDisp) {
            jdlDisp.innerText = jdlInp.value;
            jdlDisp.style.display = 'block';
            jdlInp.style.display = 'none';
        }
    });

    // 2. Aktifkan Mode PDF & Sembunyikan tombol
    element.classList.add('pdf-mode');
    
    // TRICK KHUSUS iPHONE: Tambahkan inline style untuk memaksa tabel
    const tabelElement = element.querySelector('table');
    tabelElement.style.display = 'table'; 

    document.querySelectorAll('.no-print').forEach(el => {
        el.style.setProperty('display', 'none', 'important');
    });

    // Beri waktu 300ms (lebih lama sedikit) agar Safari selesai merender ulang struktur tabel
    await new Promise(resolve => setTimeout(resolve, 300));

    const opt = {
        margin: [10, 5, 10, 5],
        filename: `LCS_2026_${namaPenyuluh}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, 
            useCORS: true, 
            letterRendering: true,
            scrollX: 0,
            scrollY: 0,
            windowWidth: 1000 // Paksa lebar kalkulasi ke ukuran desktop (A4)
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    try {
        // Proses download
        await html2pdf().set(opt).from(element).save();
    } catch (err) {
        console.error("PDF Error:", err);
        alert("Gagal mengunduh PDF, coba lagi.");
    } finally {
        // 3. Reset Tampilan ke mode Mobile kembali
        element.classList.remove('pdf-mode');
        tabelElement.style.display = ''; // Lepas paksaan inline style
        
        document.querySelectorAll('.no-print').forEach(el => el.style.display = '');
        document.querySelectorAll('.inp-tgl, .inp-judul').forEach(el => el.style.display = 'block');
        document.querySelectorAll('.temp-text').forEach(el => el.style.display = 'none');
        
        // Kembalikan posisi scroll pengguna
        window.scrollTo(0, scrollY);
    }
}
document.addEventListener('DOMContentLoaded', async () => {
    await sinkronisasiJudul();
    addRow(); addRow(); addRow();
});
</script>
</body>
</html>
