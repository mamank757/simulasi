<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu BPP Bola</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:#f4f6f7;
margin:0;
}

header{
background:#1B5E20;
color:white;
text-align:center;
padding:20px;
}

/* GRID MENU */

.menu-grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;

}

/* UBIN MENU */

.menu-item{

background:white;
border-radius:12px;
padding:20px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.2s;

}

.menu-item:hover{

transform:translateY(-5px);

}

.menu-item i{

font-size:35px;
color:#2e7d32;
margin-bottom:10px;

}

.menu-item p{

margin:0;
font-weight:bold;

}

</style>

</head>

<body>

<header>

<h2>BPP Bola Kabupaten Wajo</h2>

</header>

<div class="menu-grid">

<div class="menu-item">
<i class="fa-solid fa-user"></i>
<p>Profil</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-seedling"></i>
<p>Program</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-newspaper"></i>
<p>Berita</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-chart-line"></i>
<p>Data</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-image"></i>
<p>Galeri</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-phone"></i>
<p>Kontak</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-users"></i>
<p>Kelompok Tani</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-tractor"></i>
<p>Alsintan</p>
</div>

<div class="menu-item">
<i class="fa-solid fa-right-to-bracket"></i>
<p>Login</p>
</div>

</div>

</body>
</html>
