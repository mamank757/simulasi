<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LCS, Tanggal, Nama Penyuluh</title>

<style>

body{
font-family:'Times New Roman',serif;
margin:0;
padding:20px;
background:#000;
}

.container{
width:95%;
max-width:1000px;
margin:auto;
background:white;
padding:40px;
border-radius:8px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h2,.header h3{
margin:2px 0;
text-transform:uppercase;
font-size:1.1rem;
font-weight:bold;
}

.info-section{
display:grid;
grid-template-columns:180px 20px 1fr;
gap:2px 0;
margin-bottom:25px;
max-width:650px;
}

input,select,textarea{
padding:6px 10px;
border:1px solid #000;
border-radius:4px;
width:100%;
font-family:inherit;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #000;
padding:8px;
text-align:center;
}

th{
background:#f2f2f2;
}

textarea{
resize:none;
min-height:100px;
}

.preview-box{
width:100%;
height:110px;
border:1px dashed #bbb;
margin:5px auto;
display:flex;
align-items:center;
justify-content:center;
background:#fafafa;
overflow:hidden;
}

.preview-box img{
width:100%;
height:100%;
display:none;
object-fit:cover;
}

.controls{
margin-top:20px;
display:flex;
gap:10px;
}

.btn{
padding:12px;
cursor:pointer;
border:none;
border-radius:4px;
font-weight:bold;
color:white;
flex:1;
}

.btn-add{background:#27ae60;}
.btn-remove{background:#e74c3c;}

.btn-print{
background:#2c3e50;
width:100%;
padding:15px;
font-size:16px;
color:white;
cursor:pointer;
border-radius:6px;
border:none;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>LAPORAN PENDERASAN INFORMASI DAN PEMBANGUNAN PERTANIAN</h2>
<h3>PENYULUH PERTANIAN</h3>
<h3>TAHUN 2026</h3>
</div>

<div class="info-section">

<label>PERIODE</label>
<span>:</span>

<select>
<option>BULAN JANUARI</option>
<option>BULAN FEBRUARI</option>
<option>BULAN MARET</option>
<option>BULAN APRIL</option>
<option>BULAN MEI</option>
<option>BULAN JUNI</option>
<option>BULAN JULI</option>
<option>BULAN AGUSTUS</option>
<option>BULAN SEPTEMBER</option>
<option>BULAN OKTOBER</option>
<option>BULAN NOVEMBER</option>
<option>BULAN DESEMBER</option>
</select>

<label>NAMA PENYULUH</label>
<span>:</span>
<input type="text">

<label>NIP.</label>
<span>:</span>
<input type="text">

<label>WILBIN/WKPP</label>
<span>:</span>
<input type="text">

</div>

<table>

<thead>
<tr>
<th>No</th>
<th>TANGGAL</th>
<th>JUDUL KONTEN</th>
<th>LIKE</th>
<th>COMMENT</th>
<th>SHARE</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="controls">
<button class="btn btn-remove" onclick="removeRow()">- Hapus Baris</button>
<button class="btn btn-add" onclick="addRow()">+ Tambah Baris</button>
</div>

<button class="btn-print" onclick="window.print()">DOWNLOAD PDF</button>

</div>

<script>

let count=0;
const tableBody=document.getElementById('tableBody');

function autoResize(textarea){
textarea.style.height='auto';
textarea.style.height=textarea.scrollHeight+'px';
}

function addRow(){

count++;

const tr=document.createElement('tr');

tr.innerHTML=`

<td>${count}</td>

<td>
<input type="date" value="${new Date().toISOString().split('T')[0]}">
</td>

<td>

<select class="judul-select" onchange="const ta=this.nextElementSibling; ta.value=this.value; autoResize(ta);">
<option value="">Memuat Judul...</option>
</select>

<textarea oninput="autoResize(this)" placeholder="Judul akan muncul otomatis"></textarea>

</td>

<td>
<input type="file">
<div class="preview-box"><img></div>
</td>

<td>
<input type="file">
<div class="preview-box"><img></div>
</td>

<td>
<input type="file">
<div class="preview-box"><img></div>
</td>

`;

tableBody.appendChild(tr);

loadJudulKonten();

}

function removeRow(){

if(count>1){

tableBody.removeChild(tableBody.lastChild);
count--;

}

}

async function loadJudulKonten(){

const proxy="https://api.allorigins.win/raw?url=";
const url="https://www.bppbola.my.id/judul-konten";

try{

const res=await fetch(proxy+encodeURIComponent(url));
const html=await res.text();

const parser=new DOMParser();
const doc=parser.parseFromString(html,"text/html");

const items=doc.querySelectorAll("li,p");

let options='<option value="">List Judul Konten</option>';

items.forEach(el=>{

const teks=el.innerText.trim();

if(teks.length>20){
options+=`<option value="${teks}">${teks}</option>`;
}

});

document.querySelectorAll(".judul-select").forEach(select=>{
select.innerHTML=options;
});

}catch(err){

console.log("Gagal mengambil judul",err);

}

}

document.addEventListener('DOMContentLoaded',()=>{

addRow();
addRow();
addRow();

});

</script>

</body>
</html>
