<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVIDEN LCS DIGITAL - King Mamank</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', Times, serif; background: #000; margin: 0; padding: 0; }
        
        .btn-home {
            position: fixed; bottom: 80px; right: 20px; background: #27ae60; color: white;
            width: 50px; height: 50px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; text-decoration: none;
            font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10001;
            border: 2px solid white;
        }

        .panel-kendali {
            background: #ffffff; padding: 10px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 9999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%;
        }
        
        button { padding: 10px 12px; cursor: pointer; border-radius: 6px; border: none; color: white; font-weight: bold; font-size: 11px; }
        .btn-print { background: #0b544e; flex: 2; margin: 0 5px; }
        .btn-add { background: #27ae60; flex: 1; }
        .btn-reset { background: #dc3545; flex: 1; }

        .kertas-wrapper { padding: 10px; display: flex; justify-content: center; }
        .kertas-a4 { 
            width: 210mm; min-height: 297mm; padding: 10mm 15mm; 
            background: white; box-sizing: border-box; color: black;
        }

        .judul-laporan { text-align: center; font-weight: bold; font-size: 13pt; margin-bottom: 25px; text-transform: uppercase; line-height: 1.2; }
        
        .identitas { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 11pt; }
        .identitas td { padding: 5px 0; vertical-align: middle; }
        .label-id { width: 180px; font-weight: bold; }
        .titik-id { width: 20px; text-align: center; }
        .identitas input, .identitas select { 
            width: 100%; border: none; font-size: 11pt; font-family: inherit; background: transparent; outline: none;
        }

        /* TABEL TANPA FIXED LAYOUT */
        table.tabel-data { width: 100%; border-collapse: collapse; border: 1.5px solid black; }
        table.tabel-data th { background-color: #2ecc71 !important; padding: 8px 2px; border: 1px solid black; font-size: 10pt; }
        table.tabel-data td { 
            border: 1px solid black; padding: 8px 5px; vertical-align: middle; 
            font-size: 9pt; text-align: center; 
        }

        .col-no { width: 30px; }
        .col-tgl { width: 100px; }
        .col-judul { text-align: center !important; width: 250px; position: relative; } 
        .col-foto { width: 90px; }

        /* INPUT TANGGAL & TEXTAREA */
        .input-tgl { width: 100%; border: none; text-align: center; font-family: inherit; font-size: 9pt; background: transparent; }
        
        textarea.input-judul { 
            width: 100%; min-height: 40px; border: none; resize: none; 
            font-size: 10pt; font-family: 'Times New Roman', serif; 
            background: transparent; overflow: hidden; display: block;
            padding: 0; margin: 0;
        }

        /* DIV KHUSUS UNTUK CETAK (GHOST ELEMENT) */
        .print-only-text {
            display: none; /* Sembunyi saat di layar */
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-wrap: break-word;
            font-size: 10pt;
            line-height: 1.4;
            color: black;
            width: 100%;
        }

        .foto-container { 
            width: 100%; height: 140px; border: 1px dashed #ccc; 
            position: relative; background: #fafafa; display: flex; 
            align-items: center; justify-content: center; overflow: hidden; 
        }
        .img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .file-input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }
        .label-foto { font-size: 8pt; color: #888; font-weight: bold; }

        @media screen and (max-width: 768px) { 
            .kertas-a4 { width: 100% !important; padding: 10px !important; }
        }
    </style>
</head>
<body onload="muatDataLokal()">

    <a href="https://mamank757.github.io/PPL" class="btn-home" id="home-btn">🏠</a>

    <div class="panel-kendali" id="toolbar">
        <button class="btn-add" onclick="tambahBaris()">+ BARIS</button>
        <button class="btn-print" onclick="simpanPDFAndroid()">💾 SIMPAN PDF</button>
        <button class="btn-reset" onclick="tampilkanPopup()">🔄 RESET</button>
    </div>

    <div class="kertas-wrapper" id="capture-area">
        <div class="kertas-a4">
            <div class="judul-laporan">
                LAPORAN PENDERASAN INFORMASI DAN PEMBANGUNAN PERTANIAN<br>
                PENYULUH PERTANIAN TAHUN 2026
            </div>

            <table class="identitas">
                <tr><td class="label-id">PERIODE</td><td class="titik-id">:</td><td><select id="id_periode" onchange="simpanTeks('id_periode')"><option value="">-- Pilih Bulan --</option><option>JANUARI</option><option>FEBRUARI</option><option>MARET</option><option>APRIL</option><option>MEI</option><option>JUNI</option><option>JULI</option><option>AGUSTUS</option><option>SEPTEMBER</option><option>OKTOBER</option><option>NOVEMBER</option><option>DESEMBER</option></select></td></tr>
                <tr><td class="label-id">NAMA PENYULUH</td><td class="titik-id">:</td><td><input type="text" id="id_nama" placeholder="Nama Lengkap" oninput="simpanTeks('id_nama')"></td></tr>
                <tr><td class="label-id">NIP</td><td class="titik-id">:</td><td><input type="text" id="id_nip" placeholder="NIP" oninput="formatNIP(this); simpanTeks('id_nip')"></td></tr>
                <tr><td class="label-id">WILBIN/WKPP</td><td class="titik-id">:</td><td><input type="text" id="id_wilayah" placeholder="Wilayah Kerja" oninput="simpanTeks('id_wilayah')"></td></tr>
            </table>

            <table class="tabel-data">
                <thead>
                    <tr>
                        <th class="col-no" rowspan="2">NO</th>
                        <th class="col-tgl" rowspan="2">TANGGAL</th>
                        <th class="col-judul" rowspan="2">JUDUL KONTEN</th>
                        <th colspan="3">EVIDEN</th>
                    </tr>
                    <tr>
                        <th class="col-foto">LIKE</th>
                        <th class="col-foto">COMMENT</th>
                        <th class="col-foto">SHARE</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="popup-reset" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:10px; text-align:center;">
            <p style="color:black; font-weight:bold;">Bersihkan data laporan?</p>
            <button onclick="konfirmasiReset()" style="background:#dc3545;">Ya, Hapus</button>
            <button onclick="tutupPopup()" style="background:#6c757d;">Batal</button>
        </div>
    </div>

<script>
    const tbody = document.getElementById('table-body');
    let jumlahBaris = parseInt(localStorage.getItem('jumlahBaris')) || 3;

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';
    }

    function formatTanggalIndo(tgl) {
        if(!tgl) return "";
        const [y, m, d] = tgl.split("-");
        return `${d}-${m}-${y}`;
    }

    function renderBaris(i) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${i}</td>
            <td class="col-tgl">
                <input type="date" id="tgl_${i}" class="input-tgl" value="${new Date().toISOString().split('T')[0]}" oninput="simpanTeks('tgl_${i}')">
                <div id="tgl_text_${i}" class="print-only-text" style="text-align:center"></div>
            </td>
            <td class="col-judul">
                <textarea id="judul_${i}" class="input-judul" placeholder="Isi judul..." oninput="simpanTeks('judul_${i}'); autoResize(this)" rows="1"></textarea>
                <div id="judul_text_${i}" class="print-only-text"></div>
            </td>
            <td><div class="foto-container"><span class="label-foto label-eviden">LIKE</span><img id="img_like_${i}" class="img-preview"><input type="file" class="file-input label-eviden" onchange="prosesGambar(this, 'img_like_${i}')"></div></td>
            <td><div class="foto-container"><span class="label-foto label-eviden">COM</span><img id="img_comen_${i}" class="img-preview"><input type="file" class="file-input label-eviden" onchange="prosesGambar(this, 'img_comen_${i}')"></div></td>
            <td><div class="foto-container"><span class="label-foto label-eviden">SHR</span><img id="img_share_${i}" class="img-preview"><input type="file" class="file-input label-eviden" onchange="prosesGambar(this, 'img_share_${i}')"></div></td>
        `;
        return tr;
    }

    function muatDataLokal() {
        tbody.innerHTML = "";
        for (let i = 1; i <= jumlahBaris; i++) {
            tbody.appendChild(renderBaris(i));
            const ts = localStorage.getItem(`tgl_${i}`); if(ts) document.getElementById(`tgl_${i}`).value = ts;
            const js = localStorage.getItem(`judul_${i}`); if(js) {
                const el = document.getElementById(`judul_${i}`);
                el.value = js; autoResize(el);
            }
            ['like', 'comen', 'share'].forEach(type => {
                const imgS = localStorage.getItem(`img_${type}_${i}`);
                if(imgS) { const img = document.getElementById(`img_${type}_${i}`); img.src = imgS; img.style.display = 'block'; }
            });
        }
        ['id_periode', 'id_nama', 'id_nip', 'id_wilayah'].forEach(id => {
            const v = localStorage.getItem(id); if(v) document.getElementById(id).value = v;
        });
    }

    function tambahBaris() {
        jumlahBaris++;
        localStorage.setItem('jumlahBaris', jumlahBaris);
        tbody.appendChild(renderBaris(jumlahBaris));
    }

    function simpanTeks(id) { localStorage.setItem(id, document.getElementById(id).value); }

    function prosesGambar(input, imgId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(imgId);
                img.src = e.target.result; img.style.display = 'block';
                try { localStorage.setItem(imgId, e.target.result); } catch(err) { alert("Memori penuh!"); }
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function formatNIP(input) {
        let v = input.value.replace(/\D/g, '');
        if (v.length > 18) v = v.substr(0, 18);
        input.value = v.replace(/(\d{8})(\d{6})(\d{1})(\d{3})/, '$1 $2 $3 $4');
    }

    async function simpanPDFAndroid() {
        const area = document.getElementById('capture-area');
        const labels = document.querySelectorAll('.label-eviden');
        const toolbar = document.getElementById('toolbar');
        const homeBtn = document.getElementById('home-btn');

        // 1. Sembunyikan Navigasi
        toolbar.style.display = 'none';
        homeBtn.style.display = 'none';
        labels.forEach(l => l.style.display = 'none');

        // 2. PREPARE TEXT UNTUK CETAK (GHOSTING)
        for (let i = 1; i <= jumlahBaris; i++) {
            const txtArea = document.getElementById(`judul_${i}`);
            const txtDisplay = document.getElementById(`judul_text_${i}`);
            const dateInput = document.getElementById(`tgl_${i}`);
            const dateDisplay = document.getElementById(`tgl_text_${i}`);

            // Pindahkan isi textarea ke div teks murni
            txtDisplay.innerText = txtArea.value;
            txtDisplay.style.display = 'block';
            txtArea.style.display = 'none';

            // Pindahkan isi tanggal ke div teks murni
            dateDisplay.innerText = formatTanggalIndo(dateInput.value);
            dateDisplay.style.display = 'block';
            dateInput.style.display = 'none';
        }

        const opt = {
            margin: [10, 5, 10, 5],
            filename: `LCS_${document.getElementById('id_nama').value || 'PPL'}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
            await html2pdf().set(opt).from(area).save();
        } finally {
            // 3. KEMBALIKAN TAMPILAN SEMULA
            for (let i = 1; i <= jumlahBaris; i++) {
                document.getElementById(`judul_text_${i}`).style.display = 'none';
                document.getElementById(`judul_${i}`).style.display = 'block';
                document.getElementById(`tgl_text_${i}`).style.display = 'none';
                document.getElementById(`tgl_${i}`).style.display = 'block';
            }
            toolbar.style.display = 'flex';
            homeBtn.style.display = 'flex';
            labels.forEach(l => l.style.display = '');
        }
    }

    function tampilkanPopup() { document.getElementById('popup-reset').style.display = 'flex'; }
    function tutupPopup() { document.getElementById('popup-reset').style.display = 'none'; }
    function konfirmasiReset() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
