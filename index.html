<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVIDEN LCS DIGITAL - King Mamank</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', Times, serif; background: #f0f0f0; margin: 0; padding: 0; }
        
        /* TOMBOL HOME */
        .btn-home {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #27ae60;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10001;
            border: 2px solid white;
        }

        /* PANEL KENDALI MOBILE */
        .panel-kendali {
            background: #ffffff; 
            padding: 10px; 
            display: flex; 
            gap: 5px;
            position: sticky; 
            top: 0; 
            z-index: 9999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        button { padding: 10px 5px; cursor: pointer; border-radius: 6px; border: none; color: white; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .btn-print { background: #0b544e; flex: 2; }
        .btn-add { background: #27ae60; flex: 1; }
        .btn-reset { background: #dc3545; flex: 1; }

        /* KERTAS & LAYOUT */
        .kertas-wrapper { width: 100%; padding: 0; display: flex; justify-content: center; }
        
        .kertas-a4 { 
            width: 100%; 
            max-width: 210mm; /* Standar A4 saat diprint */
            min-height: 297mm; 
            padding: 15px; 
            background: white; 
            box-sizing: border-box;
            margin: 0 auto;
        }

        .judul-laporan { text-align: center; font-weight: bold; font-size: 11pt; margin-bottom: 20px; text-transform: uppercase; color:#000; line-height: 1.2; }
        
        /* IDENTITAS */
        .identitas { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 10pt; }
        .identitas td { padding: 4px 0; vertical-align: middle; border: none !important; }
        .label-id { width: 100px; font-weight: bold; }
        .titik-id { width: 15px; text-align: center; }
        .identitas input, .identitas select { 
            width: 100%; border: none; border-bottom: 1px solid #eee; font-size: 10pt; padding: 2px; font-family: inherit; outline: none;
        }

        /* TABEL DATA MOBILE OPTIMIZED */
        table.tabel-data { width: 100%; border-collapse: collapse; border: 1px solid black; table-layout: fixed; }
        table.tabel-data th { background-color: #2ecc71 !important; color: black; padding: 5px 2px; border: 1px solid black; font-size: 8pt; }
        table.tabel-data td { border: 1px solid black; padding: 3px; vertical-align: middle; font-size: 8pt; text-align: center; }

        /* PENGATURAN KOLOM AGAR PAS DI HP */
        .col-no { width: 25px; }
        .col-tgl { width: 75px; }
        .col-judul { width: auto; } /* Judul akan fleksibel mengambil sisa ruang */
        .col-eviden { width: 55px; } /* Lebar kolom Like, Com, Share disamakan */

        .input-tgl { width: 100%; border: none; text-align: center; font-size: 8pt; font-family: inherit; background: transparent; }
        
        textarea.input-judul { 
            width: 100%; 
            min-height: 60px;
            border: none; 
            resize: none; 
            font-size: 9pt; 
            font-family: inherit; 
            padding: 2px; 
            background: transparent; 
        }

        /* FOTO BOX */
        .foto-container { 
            width: 100%; 
            height: 60px; /* Diperkecil untuk tampilan HP agar tidak terlalu panjang kebawah */
            border: 1px dashed #ccc; 
            position: relative; 
            background: #fafafa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        
        .img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .file-input { position: absolute; width: 100%; height: 100%; opacity: 0; z-index: 10; cursor: pointer; }
        .label-foto { font-size: 6pt; color: #888; text-align: center; line-height: 1; }

        /* KHUSUS CETAK PDF */
        @media print {
            body { background: white; }
            .panel-kendali, .btn-home { display: none !important; }
            .kertas-a4 { width: 210mm; padding: 10mm; }
            .foto-container { height: 100px; } /* Kembali agak besar saat di PDF */
        }
    </style>
</head>
<body onload="muatDataLokal()">

    <a href="https://mamank757.github.io/PPL" class="btn-home" id="home-btn">🏠</a>

    <div class="panel-kendali" id="toolbar">
        <button class="btn-add" onclick="tambahBaris()">+ Baris</button>
        <button class="btn-print" onclick="simpanPDFAndroid()">💾 Simpan PDF</button>
        <button class="btn-reset" onclick="tampilkanPopup()">🔄 Reset</button>
    </div>

    <div class="kertas-wrapper" id="capture-area">
        <div class="kertas-a4">
            <div class="judul-laporan">
                LAPORAN PENDERASAN INFORMASI DAN PEMBANGUNAN PERTANIAN<br>
                PENYULUH PERTANIAN TAHUN 2026
            </div>

            <table class="identitas">
                <tr>
                    <td class="label-id">PERIODE</td>
                    <td class="titik-id">:</td>
                    <td>
                        <select id="id_periode" onchange="simpanTeks('id_periode')">
                            <option value="">-- Pilih Bulan --</option>
                            <option>JANUARI</option><option>FEBRUARI</option><option>MARET</option>
                            <option>APRIL</option><option>MEI</option><option>JUNI</option>
                            <option>JULI</option><option>AGUSTUS</option><option>SEPTEMBER</option>
                            <option>OKTOBER</option><option>NOVEMBER</option><option>DESEMBER</option>
                        </select>
                    </td>
                </tr>
                <tr><td class="label-id">NAMA</td><td class="titik-id">:</td><td><input type="text" id="id_nama" placeholder="Nama Lengkap" oninput="simpanTeks('id_nama')"></td></tr>
                <tr><td class="label-id">NIP</td><td class="titik-id">:</td><td><input type="text" id="id_nip" placeholder="NIP" oninput="formatNIP(this); simpanTeks('id_nip')"></td></tr>
                <tr><td class="label-id">WILBIN</td><td class="titik-id">:</td><td><input type="text" id="id_wilayah" placeholder="Wilayah Kerja" oninput="simpanTeks('id_wilayah')"></td></tr>
            </table>

            <table class="tabel-data">
                <thead>
                    <tr>
                        <th class="col-no" rowspan="2">NO</th>
                        <th class="col-tgl" rowspan="2">TANGGAL</th>
                        <th class="col-judul" rowspan="2">JUDUL KONTEN</th>
                        <th colspan="3">EVIDEN</th>
                    </tr>
                    <tr>
                        <th class="col-eviden">LIKE</th>
                        <th class="col-eviden">CMNT</th>
                        <th class="col-eviden">SHRE</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="popup-reset" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:10px; text-align:center; width:80%;">
            <p style="color:black; font-weight:bold;">Hapus semua data?</p>
            <div style="display:flex; gap:10px;">
                <button onclick="konfirmasiReset()" style="background:#dc3545; flex:1;">Ya</button>
                <button onclick="tutupPopup()" style="background:#6c757d; flex:1;">Batal</button>
            </div>
        </div>
    </div>

  <script>
    const tbody = document.getElementById('table-body');
    let jumlahBaris = parseInt(localStorage.getItem('jumlahBaris')) || 3;

    function renderBaris(i) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${i}</td>
            <td><input type="date" id="tgl_${i}" class="input-tgl" value="${new Date().toISOString().split('T')[0]}" oninput="simpanTeks('tgl_${i}')"></td>
            <td><textarea id="judul_${i}" class="input-judul" placeholder="..." oninput="simpanTeks('judul_${i}')"></textarea></td>
            <td><div class="foto-container"><span class="label-foto label-eviden">L</span><img id="img_like_${i}" class="img-preview"><input type="file" class="file-input" onchange="prosesGambar(this, 'img_like_${i}')"></div></td>
            <td><div class="foto-container"><span class="label-foto label-eviden">C</span><img id="img_comen_${i}" class="img-preview"><input type="file" class="file-input" onchange="prosesGambar(this, 'img_comen_${i}')"></div></td>
            <td><div class="foto-container"><span class="label-foto label-eviden">S</span><img id="img_share_${i}" class="img-preview"><input type="file" class="file-input" onchange="prosesGambar(this, 'img_share_${i}')"></div></td>
        `;
        return tr;
    }

    function muatDataLokal() {
        tbody.innerHTML = "";
        for (let i = 1; i <= jumlahBaris; i++) {
            tbody.appendChild(renderBaris(i));
            if(localStorage.getItem(`tgl_${i}`)) document.getElementById(`tgl_${i}`).value = localStorage.getItem(`tgl_${i}`);
            if(localStorage.getItem(`judul_${i}`)) document.getElementById(`judul_${i}`).value = localStorage.getItem(`judul_${i}`);
            ['like', 'comen', 'share'].forEach(type => {
                const savedImg = localStorage.getItem(`img_${type}_${i}`);
                if(savedImg) {
                    const imgEl = document.getElementById(`img_${type}_${i}`);
                    imgEl.src = savedImg;
                    imgEl.style.display = 'block';
                }
            });
        }
        ['id_periode', 'id_nama', 'id_nip', 'id_wilayah'].forEach(id => {
            if(localStorage.getItem(id)) document.getElementById(id).value = localStorage.getItem(id);
        });
    }

    function tambahBaris() {
        jumlahBaris++;
        localStorage.setItem('jumlahBaris', jumlahBaris);
        tbody.appendChild(renderBaris(jumlahBaris));
    }

    function simpanTeks(id) { localStorage.setItem(id, document.getElementById(id).value); }

    function prosesGambar(input, imgId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
                localStorage.setItem(imgId, e.target.result);
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function formatNIP(input) {
        let val = input.value.replace(/\D/g, '');
        input.value = val.replace(/(\d{8})(\d{6})(\d{1})(\d{3})/, '$1 $2 $3 $4');
    }

    function simpanPDFAndroid() {
        const element = document.getElementById('capture-area');
        const toolbar = document.getElementById('toolbar');
        const homeBtn = document.getElementById('home-btn');
        const labels = document.querySelectorAll('.label-eviden');
        
        toolbar.style.display = 'none';
        homeBtn.style.display = 'none';
        labels.forEach(el => el.style.display = 'none');

        const opt = {
            margin: [10, 5, 10, 5],
            filename: `LCS_${document.getElementById('id_nama').value || 'User'}.pdf`,
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            toolbar.style.display = 'flex';
            homeBtn.style.display = 'flex';
            labels.forEach(el => el.style.display = '');
            alert("PDF Berhasil Disimpan!");
        });
    }

    function tampilkanPopup() { document.getElementById('popup-reset').style.display = 'flex'; }
    function tutupPopup() { document.getElementById('popup-reset').style.display = 'none'; }
    function konfirmasiReset() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
